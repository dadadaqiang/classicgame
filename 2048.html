<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),S=document.getElementById('score'),ST=document.getElementById('status');
const SZ=4,T=C.width/SZ,P=6,R=6;
let grid,score,gameOver,win;
const COLORS={
  0:'rgba(0,0,0,0)',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',
  128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e',4096:'#3c3a3e',8192:'#2a2a2e'
};
const TEXT_COLORS={2:'#776e65',4:'#776e65',8:'#f9f6f2',16:'#f9f6f2',32:'#f9f6f2',64:'#f9f6f2',128:'#f9f6f2',256:'#f9f6f2',512:'#f9f6f2',1024:'#f9f6f2',2048:'#f9f6f2'};
function init(){grid=Array.from({length:SZ},()=>Array(SZ).fill(0));score=0;gameOver=false;win=false;S.textContent='0';ST.textContent='← ↑ → ↓ 方向键移动';addTile();addTile();draw()}
function addTile(){let e=[];for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(!grid[r][c])e.push({r,c});if(!e.length)return;const {r,c}=e[Math.floor(Math.random()*e.length)];grid[r][c]=Math.random()<0.9?2:4}
function draw(){X.clearRect(0,0,C.width,C.height);X.fillStyle='rgba(255,255,255,0.04)';X.fillRect(0,0,C.width,C.height);
for(let r=0;r<SZ;r++){for(let c=0;c<SZ;c++){const v=grid[r][c];const x=c*T,y=r*T;X.beginPath();X.roundRect(x+P,y+P,T-P*2,T-P*2,R);X.fillStyle=COLORS[v]||'#3c3a3e';X.fill();
if(v){X.fillStyle=TEXT_COLORS[v]||'#f9f6f2';const fs=v<100?28:v<1000?22:16;X.font=`bold ${fs}px 'Segoe UI',sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(v,x+T/2,y+T/2+1)}}}}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,rr){this.moveTo(x+rr,y);this.lineTo(x+w-rr,y);this.quadraticCurveTo(x+w,y,x+w,y+rr);this.lineTo(x+w,y+h-rr);this.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);this.lineTo(x+rr,y+h);this.quadraticCurveTo(x,y+h,x,y+h-rr);this.lineTo(x,y+rr);this.quadraticCurveTo(x,y,x+rr,y)}}
function slideRow(row){let f=row.filter(v=>v!==0);let s=[];let sc=0;for(let i=0;i<f.length;i++){if(i+1<f.length&&f[i]===f[i+1]){s.push(f[i]*2);sc+=f[i]*2;i++}else s.push(f[i])}while(s.length<SZ)s.push(0);return{s,sc}}
function move(dr,dc){let moved=false;let tsc=0;if(dr===0&&dc===1){for(let r=0;r<SZ;r++){const row=grid[r];const{s,sc}=slideRow([...row].reverse());tsc+=sc;for(let c=0;c<SZ;c++){if(grid[r][c]!==s[SZ-1-c])moved=true;grid[r][c]=s[SZ-1-c]}}}
else if(dr===0&&dc===-1){for(let r=0;r<SZ;r++){const{s,sc}=slideRow(grid[r]);tsc+=sc;for(let c=0;c<SZ;c++){if(grid[r][c]!==s[c])moved=true;grid[r][c]=s[c]}}}
else if(dr===1&&dc===0){for(let c=0;c<SZ;c++){let col=[];for(let r=0;r<SZ;r++)col.push(grid[r][c]);const{s,sc}=slideRow([...col].reverse());tsc+=sc;for(let r=0;r<SZ;r++){if(grid[r][c]!==s[SZ-1-r])moved=true;grid[r][c]=s[SZ-1-r]}}}
else if(dr===-1&&dc===0){for(let c=0;c<SZ;c++){let col=[];for(let r=0;r<SZ;r++)col.push(grid[r][c]);const{s,sc}=slideRow(col);tsc+=sc;for(let r=0;r<SZ;r++){if(grid[r][c]!==s[r])moved=true;grid[r][c]=s[r]}}}
if(moved){score+=tsc;S.textContent=score;addTile();draw();checkGameOver()}
draw()}
function checkGameOver(){let full=true;for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(!grid[r][c])full=false;if(c+1<SZ&&grid[r][c]===grid[r][c+1])return;if(r+1<SZ&&grid[r][c]===grid[r+1][c])return}
if(full){gameOver=true;ST.textContent='💀 游戏结束！没有可移动的方块了'}
for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(grid[r][c]===2048&&!win){win=true;ST.textContent='🎉 你赢了！达到 2048！'}}
document.getElementById('startBtn').addEventListener('click',()=>init());
document.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();const m={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};const[dAr,dAc]=m[e.key];move(dAr,dAc)}});
let txs=0,tys=0;C.addEventListener('touchstart',e=>{const t=e.touches[0];txs=t.clientX;tys=t.clientY},{passive:true});
C.addEventListener('touchend',e=>{const t=e.changedTouches[0];const dx=t.clientX-txs,dy=t.clientY-tys;if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
if(Math.abs(dx)>Math.abs(dy)){move(0,dx>0?1:-1)}else{move(dy>0?1:-1,0)}},{passive:true});
init();
</script></body></html>
