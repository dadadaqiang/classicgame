<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋 ❌</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Segoe UI',system-ui,sans-serif}
.game-wrapper{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:#fff}
.header h1{font-size:24px;font-weight:700}.turn{background:rgba(255,255,255,0.1);padding:6px 16px;border-radius:10px;font-size:14px;font-weight:600}
.turn span{color:#fbbf24}canvas{display:block;margin:0 auto;border-radius:12px;background:#1a1a2e;box-shadow:inset 0 0 30px rgba(0,0,0,0.5)}
.controls{display:flex;justify-content:center;gap:12px;margin-top:20px}
.controls button{padding:10px 28px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.1);color:#fff;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.15)}
.controls button:hover{background:rgba(255,255,255,0.2);transform:translateY(-2px)}
.controls button.primary{background:#6366f1;border-color:#6366f1}.controls button.primary:hover{background:#4f46e5}
.status{text-align:center;color:rgba(255,255,255,0.6);font-size:14px;margin-top:14px;min-height:22px}
@media(max-width:500px){.game-wrapper{padding:16px}.header h1{font-size:18px}canvas{max-width:100%}}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header"><h1>❌ 井字棋</h1><div class="turn"><span id="turn">你的回合 (❌)</span></div></div>
  <canvas id="gameCanvas" width="360" height="360"></canvas>
  <div class="controls">
    <button class="primary" id="startBtn">新游戏</button>
  </div>
  <div class="status" id="status">点击格子落子 · 三连获胜</div>
</div>
<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),tE=document.getElementById('turn'),ST=document.getElementById('status');
const SZ=3,CELL=C.width/SZ,R=8;
let board,turn,gameOver,winner;
function init(){board=Array.from({length:SZ},()=>Array(SZ).fill(0));turn=1;gameOver=false;winner=0;tE.textContent='你的回合 (❌)';ST.textContent='点击格子落子 · 三连获胜';draw()}
function draw(){X.clearRect(0,0,C.width,C.height);
X.strokeStyle='rgba(255,255,255,0.12)';X.lineWidth=2;
for(let i=1;i<SZ;i++){X.beginPath();X.moveTo(i*CELL,0);X.lineTo(i*CELL,C.height);X.stroke();X.beginPath();X.moveTo(0,i*CELL);X.lineTo(C.width,i*CELL);X.stroke()}
for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(!board[r][c])continue;const x=c*CELL+CELL/2,y=r*CELL+CELL/2;
if(board[r][c]===1){X.strokeStyle='#60a5fa';X.lineWidth=5;X.lineCap='round';const s=CELL*0.3;
X.beginPath();X.moveTo(x-s,y-s);X.lineTo(x+s,y+s);X.stroke();X.beginPath();X.moveTo(x+s,y-s);X.lineTo(x-s,y+s);X.stroke()}
else{X.fillStyle='#fbbf24';X.beginPath();X.arc(x,y,CELL*0.3,0,Math.PI*2);X.strokeStyle='#f59e0b';X.lineWidth=3;X.fill();X.stroke()}}
if(gameOver&&winner){X.fillStyle='rgba(0,0,0,0.25)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#fff';X.font='bold 40px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText(winner===1?'❌ 赢！':'⭕ 赢！',C.width/2,C.height/2)}
else if(gameOver&&!winner){X.fillStyle='rgba(0,0,0,0.25)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#fff';X.font='bold 32px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('🤝 平局',C.width/2,C.height/2)}}
function checkWin(p){for(let i=0;i<SZ;i++){if(board[i].every(v=>v===p))return true;if(board.every(row=>row[i]===p))return true}if(board.every((r,i)=>r[i]===p))return true;if(board.every((r,i)=>r[SZ-1-i]===p))return true;return false}
function isFull(){return board.every(r=>r.every(v=>v!==0))}
function aiMove(){let bestScore=-Infinity,bestMove=null;
for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(board[r][c])continue;board[r][c]=2;let score=minimax(board,0,false);board[r][c]=0;if(score>bestScore){bestScore=score;bestMove={r,c}}}
if(bestMove)place(bestMove.r,bestMove.c,2)}
function minimax(b,depth,isMax){const w1=checkWin(1),w2=checkWin(2);if(w1)return-10+depth;if(w2)return 10-depth;if(isFull())return 0;
if(isMax){let best=-Infinity;for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(b[r][c])continue;b[r][c]=2;best=Math.max(best,minimax(b,depth+1,false));b[r][c]=0}return best}
else{let best=Infinity;for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(b[r][c])continue;b[r][c]=1;best=Math.min(best,minimax(b,depth+1,true));b[r][c]=0}return best}}
function place(r,c,p){if(gameOver||board[r][c]||turn!==p)return;board[r][c]=p;draw();
if(checkWin(p)){gameOver=true;winner=p;tE.textContent=p===1?'你赢了！❌':'AI 赢了！⭕';ST.textContent=winner===1?'🎉 你赢了！':'🤖 AI 赢了！';draw();return}
if(isFull()){gameOver=true;winner=0;tE.textContent='平局 🤝';ST.textContent='🤝 平局！';draw();return}
turn=p===1?2:1;tE.textContent=turn===1?'你的回合 (❌)':'AI 思考中...';if(turn===2&&!gameOver)setTimeout(aiMove,300)}
C.addEventListener('click',e=>{const r=C.getBoundingClientRect();const c=Math.floor((e.clientX-r.left)*SZ/r.width);const rr=Math.floor((e.clientY-r.top)*SZ/r.height);if(rr>=0&&rr<SZ&&c>=0&&c<SZ&&turn===1)place(rr,c,1)});
document.getElementById('startBtn').addEventListener('click',init);
init();
</script></body></html>
