<body>

<div class="game-wrapper">
  <div class="left-col">
    <div class="header">
      <a href="index.html" class="back-btn">← 游戏厅</a>
      <h1>🧱 俄罗斯方块</h1>
      <div class="score-box">🏆 得分 <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div class="controls">
      <button class="primary" id="startBtn">开始游戏</button>
      <button id="restartBtn">重新开始</button>
    </div>
    <div class="status" id="status"></div>
    <div class="page-footer">🎮 经典游戏厅 · 14 合 1</div>
    <div class="key-hint">
      <kbd>←</kbd> <kbd>→</kbd> 移动
      <kbd>↑</kbd> 旋转
      <kbd>↓</kbd> 加速
      <kbd>Space</kbd> 直落
    </div>
  </div>

  <div class="right-col">
    <div>
      <div class="label">下一个</div>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
    <div>
      <div class="label">等级</div>
      <div style="color:#fff;font-size:28px;font-weight:700;text-align:center;" id="level">1</div>
    </div>
    <div>
      <div class="label">行数</div>
      <div style="color:#fff;font-size:28px;font-weight:700;text-align:center;" id="lines">0</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const linesEl = document.getElementById('lines');
const statusEl = document.getElementById('status');

const COLS = 10;
const ROWS = 20;
const BLOCK_SIZE = canvas.width / COLS;
const PREVIEW_BLOCK = nextCanvas.width / 4;

// 俄罗斯方块形状
const SHAPES = [
  { // I
    matrix: [[1,1,1,1]],
    color: '#06b6d4'
  },
  { // O
    matrix: [[1,1],[1,1]],
    color: '#eab308'
  },
  { // T
    matrix: [[0,1,0],[1,1,1]],
    color: '#a855f7'
  },
  { // S
    matrix: [[0,1,1],[1,1,0]],
    color: '#22c55e'
  },
  { // Z
    matrix: [[1,1,0],[0,1,1]],
    color: '#ef4444'
  },
  { // J
    matrix: [[1,0,0],[1,1,1]],
    color: '#3b82f6'
  },
  { // L
    matrix: [[0,0,1],[1,1,1]],
    color: '#f97316'
  },
];

let board, currentPiece, nextPiece, score, level, lines, gameLoop, isRunning, dropInterval;
let gameOver = false;

function createPiece(shapeIdx) {
  const shape = SHAPES[shapeIdx];
  return {
    matrix: shape.matrix.map(row => [...row]),
    color: shape.color,
    x: Math.floor((COLS - shape.matrix[0].length) / 2),
    y: 0,
    shapeIdx
  };
}

function randomPiece() {
  return createPiece(Math.floor(Math.random() * SHAPES.length));
}

function init() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  score = 0;
  level = 1;
  lines = 0;
  isRunning = false;
  gameOver = false;
  dropInterval = 800;
  scoreEl.textContent = '0';
  levelEl.textContent = '1';
  linesEl.textContent = '0';
  statusEl.textContent = '';
  document.getElementById('startBtn').textContent = '开始游戏';
  currentPiece = randomPiece();
  nextPiece = randomPiece();
  draw();
  drawNext();
}

function rotateMatrix(matrix) {
  return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
}

function isValid(piece, board, offsetX, offsetY) {
  const m = piece.matrix;
  for (let r = 0; r < m.length; r++) {
    for (let c = 0; c < m[r].length; c++) {
      if (!m[r][c]) continue;
      const bx = piece.x + c + (offsetX || 0);
      const by = piece.y + r + (offsetY || 0);
      if (bx < 0 || bx >= COLS || by >= ROWS || by < 0) return false;
      if (by >= 0 && board[by][bx] !== null) return false;
    }
  }
  return true;
}

function lockPiece() {
  const m = currentPiece.matrix;
  for (let r = 0; r < m.length; r++) {
    for (let c = 0; c < m[r].length; c++) {
      if (!m[r][c]) continue;
      const bx = currentPiece.x + c;
      const by = currentPiece.y + r;
      if (by < 0) {
        endGame();
        return;
      }
      board[by][bx] = currentPiece.color;
    }
  }
  clearLines();
  spawnNext();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      r++; // re-check this row
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800];
    score += points[cleared] * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 800 - (level - 1) * 60);
    scoreEl.textContent = score;
    levelEl.textContent = level;
    linesEl.textContent = lines;
    if (isRunning) {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, dropInterval);
    }
  }
}

function spawnNext() {
  currentPiece = nextPiece;
  currentPiece.x = Math.floor((COLS - currentPiece.matrix[0].length) / 2);
  currentPiece.y = 0;
  nextPiece = randomPiece();
  drawNext();
  if (!isValid(currentPiece, board, 0, 0)) {
    endGame();
  }
}

function tick() {
  if (!isRunning || gameOver) return;
  if (isValid(currentPiece, board, 0, 1)) {
    currentPiece.y++;
    draw();
  } else {
    lockPiece();
    draw();
  }
}

function hardDrop() {
  if (!isRunning || gameOver) return;
  while (isValid(currentPiece, board, 0, 1)) {
    currentPiece.y++;
  }
  lockPiece();
  draw();
}

function move(dx) {
  if (!isRunning || gameOver) return;
  if (isValid(currentPiece, board, dx, 0)) {
    currentPiece.x += dx;
    draw();
  }
}

function rotate() {
  if (!isRunning || gameOver) return;
  const rotated = { ...currentPiece, matrix: rotateMatrix(currentPiece.matrix) };
  if (isValid(rotated, board, 0, 0)) {
    currentPiece.matrix = rotated.matrix;
    draw();
  } else {
    // wall kick: try shifting left/right
    for (const offset of [-1, 1, -2, 2]) {
      if (isValid(rotated, board, offset, 0)) {
        currentPiece.matrix = rotated.matrix;
        currentPiece.x += offset;
        draw();
        return;
      }
    }
  }
}

function endGame() {
  isRunning = false;
  gameOver = true;
  clearInterval(gameLoop);
  statusEl.textContent = `💀 游戏结束！得分: ${score}`;
  document.getElementById('startBtn').textContent = '🔄 再来一次';
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }

  // 已固定的方块
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        drawBlock(ctx, c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, board[r][c]);
      }
    }
  }

  // 当前方块
  const m = currentPiece.matrix;
  for (let r = 0; r < m.length; r++) {
    for (let c = 0; c < m[r].length; c++) {
      if (m[r][c]) {
        const x = (currentPiece.x + c) * BLOCK_SIZE;
        const y = (currentPiece.y + r) * BLOCK_SIZE;
        drawBlock(ctx, x, y, BLOCK_SIZE, currentPiece.color);
      }
    }
  }
}

function drawBlock(context, x, y, size, color) {
  const pad = 1;
  const radius = 3;
  context.beginPath();
  context.roundRect(x + pad, y + pad, size - pad * 2, size - pad * 2, radius);
  const grad = context.createLinearGradient(x, y, x + size, y + size);
  grad.addColorStop(0, lighten(color, 20));
  grad.addColorStop(1, color);
  context.fillStyle = grad;
  context.fill();
  // 高光
  context.fillStyle = 'rgba(255,255,255,0.2)';
  context.beginPath();
  context.roundRect(x + pad + 2, y + pad + 2, size - pad * 2 - 6, (size - pad * 2) / 3, 2);
  context.fill();
}

function drawNext() {
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const m = nextPiece.matrix;
  const cols = m[0].length;
  const rows = m.length;
  const offsetX = (4 - cols) * PREVIEW_BLOCK / 2;
  const offsetY = (4 - rows) * PREVIEW_BLOCK / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (m[r][c]) {
        drawBlock(nextCtx, offsetX + c * PREVIEW_BLOCK, offsetY + r * PREVIEW_BLOCK, PREVIEW_BLOCK, nextPiece.color);
      }
    }
  }
}

function lighten(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + percent);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
  const b = Math.min(255, (num & 0x0000FF) + percent);
  return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
}

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, radii) {
    const r = typeof radii === 'number' ? radii : (radii || 0);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    return this;
  };
}

function startGame() {
  if (isRunning) return;
  if (gameOver || document.getElementById('startBtn').textContent.includes('开始')) {
    init();
  }
  isRunning = true;
  gameOver = false;
  document.getElementById('startBtn').textContent = '▶ 游戏中';
  statusEl.textContent = '';
  gameLoop = setInterval(tick, dropInterval);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', () => {
  clearInterval(gameLoop);
  init();
});

document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
    e.preventDefault();
  }
  switch (key) {
    case 'ArrowLeft':  move(-1); break;
    case 'ArrowRight': move(1);  break;
    case 'ArrowDown':  tick();   break;
    case 'ArrowUp':    rotate(); break;
    case ' ':          hardDrop(); break;
  }
  if (!isRunning && !gameOver && ['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(key)) {
    startGame();
  }
});

// 触屏支持
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
}, { passive: true });
canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
canvas.addEventListener('touchend', (e) => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  const elapsed = Date.now() - touchStartTime;

  if (absDx < 10 && absDy < 10) {
    rotate(); // tap = 旋转
  } else if (absDy > absDx && dy > 40 && elapsed < 400) {
    hardDrop(); // 快速下滑 = 直落
  } else if (absDx > absDy) {
    move(dx > 0 ? 1 : -1);
  } else if (dy > 0) {
    tick(); // 向下滑 = 加速下落
  }
  if (!isRunning && !gameOver) startGame();
}, { passive: true });

init();
</script>
