<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),mE=document.getElementById('mineCount'),tE=document.getElementById('timer'),ST=document.getElementById('status');
const ROWS=9,COLS=9,MINES=10;let CELL;
let board,revealed,flagged,gameOver,win,flagCount,time,timeInterval,firstClick;
function init(){CELL=C.width/COLS;board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
revealed=Array.from({length:ROWS},()=>Array(COLS).fill(false));
flagged=Array.from({length:ROWS},()=>Array(COLS).fill(false));
gameOver=false;win=false;flagCount=0;time=0;firstClick=true;mE.textContent=MINES;tE.textContent='0';ST.textContent='左键挖开 · 右键标旗';clearInterval(timeInterval);draw()}
function placeMines(sr,sc){let placed=0;while(placed<MINES){const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);if(board[r][c]===-1||(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1))continue;board[r][c]=-1;placed++}
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(board[r][c]===-1)continue;let cnt=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)cnt++}board[r][c]=cnt}}
const NUM_COLORS={1:'#60a5fa',2:'#34d399',3:'#ef4444',4:'#a855f7',5:'#f97316',6:'#22d3ee',7:'#1e1b4b',8:'#78716c'};
function draw(){X.clearRect(0,0,C.width,C.height);
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const x=c*CELL,y=r*CELL;if(revealed[r][c]){X.fillStyle='rgba(255,255,255,0.1)';X.fillRect(x+1,y+1,CELL-2,CELL-2);
if(board[r][c]===-1){X.font='18px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('💣',x+CELL/2,y+CELL/2+1)}
else if(board[r][c]>0){X.fillStyle=NUM_COLORS[board[r][c]]||'#fff';X.font=`bold ${CELL*0.45}px 'Segoe UI',sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(board[r][c],x+CELL/2,y+CELL/2+1)}}
else if(flagged[r][c]){X.fillStyle='rgba(251,191,36,0.15)';X.fillRect(x+1,y+1,CELL-2,CELL-2);X.font='16px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('🚩',x+CELL/2,y+CELL/2+1)}
else{X.fillStyle='rgba(255,255,255,0.06)';X.fillRect(x+1,y+1,CELL-2,CELL-2);X.fillStyle='rgba(255,255,255,0.03)';X.fillRect(x+2,y+2,CELL-4,CELL-4)}}
if(gameOver){X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(0,0,C.width,C.height);X.fillStyle='#fff';X.font='bold 32px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText(win?'🎉':'💥',C.width/2,C.height/2)}}
function reveal(r,c){if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c])return;
revealed[r][c]=true;
if(board[r][c]===-1){gameOver=true;ST.textContent='💥 踩雷了！';clearInterval(timeInterval);draw();return}
if(board[r][c]===0){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc)}
checkWin()}
function checkWin(){let rv=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(revealed[r][c])rv++;if(rv===ROWS*COLS-MINES){win=true;gameOver=true;clearInterval(timeInterval);ST.textContent='🎉 你赢了！';draw()}}
function toggleFlag(r,c){if(revealed[r][c])return;flagged[r][c]=!flagged[r][c];flagCount+=flagged[r][c]?1:-1;mE.textContent=MINES-flagCount;draw()}
document.getElementById('startBtn').addEventListener('click',()=>{init()});
C.addEventListener('contextmenu',e=>e.preventDefault());
C.addEventListener('mousedown',e=>{const r=C.getBoundingClientRect();const c=Math.floor((e.clientX-r.left)*COLS/r.width);const rr=Math.floor((e.clientY-r.top)*ROWS/r.height);
if(gameOver||win)return;
if(e.button===2){toggleFlag(rr,c);return}
if(e.button===0){if(firstClick){placeMines(rr,c);firstClick=false;timeInterval=setInterval(()=>{time++;tE.textContent=time},1000)}reveal(rr,c);draw()}});
init();
</script></body></html>
