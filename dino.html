<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),S=document.getElementById('score'),ST=document.getElementById('status');
const W=600,H=250,G=-0.6,JUMP=12,GROUND=30,DINO_W=40,DINO_H=44,CACTUS_W=16,CACTUS_H=32,BIRD_W=32,BIRD_H=22;

let dinoY,dinoVY,groundX,obstacles,score,speed,running,gameOver,loop,frame,timer,highScore;
let dinoFrame,jumpCount,isDucking;

function init(){
  dinoY=0;dinoVY=0;groundX=0;obstacles=[];score=0;speed=6;running=false;gameOver=false;frame=0;timer=0;
  dinoFrame=0;jumpCount=0;isDucking=false;
  S.textContent='0';ST.textContent='空格/点击跳跃 · 躲避仙人掌和翼龙 🦎';
  document.getElementById('startBtn').textContent='开始游戏';
  draw();
}

function draw(){
  // 背景
  const isNight=Math.floor(timer/600)%2===1;
  X.fillStyle=isNight?'#1a1a2e':'#f7f7f7';
  X.fillRect(0,0,W,H);
  
  // 地面
  const gy=H-GROUND;
  X.fillStyle=isNight?'#2a2a3e':'#e0e0e0';
  X.fillRect(0,gy,W,GROUND);
  X.fillStyle=isNight?'#3a3a4e':'#ccc';
  for(let x=-groundX%20;x<W;x+=20) X.fillRect(x,gy,8,2);
  X.fillStyle=isNight?'#444':'#bbb';
  X.fillRect(0,gy,W,2);

  // 🦖 恐龙
  const dx=60,dy=H-GROUND-DINO_H-dinoY;
  X.save();
  // 身体
  X.fillStyle='#555';X.beginPath();X.roundRect(dx+6,dy+8,DINO_W-12,DINO_H-14,6);X.fill();
  X.fillStyle='#444';X.beginPath();X.roundRect(dx+12,dy+4,DINO_W-20,DINO_H-10,4);X.fill();
  // 头
  X.fillStyle='#555';X.beginPath();X.ellipse(dx+DINO_W-8,dy+6,10,9,0,0,Math.PI*2);X.fill();
  // 眼睛
  X.fillStyle='#fff';X.beginPath();X.arc(dx+DINO_W-4,dy+4,3.5,0,Math.PI*2);X.fill();
  X.fillStyle='#222';X.beginPath();X.arc(dx+DINO_W-3,dy+4,2,0,Math.PI*2);X.fill();
  // 嘴巴
  X.fillStyle='#777';X.beginPath();X.ellipse(dx+DINO_W-2,dy+9,3,1.5,0.2,0,Math.PI*2);X.fill();
  // 腿
  const legOff=Math.sin(frame*0.15)*4;
  X.fillStyle='#555';X.fillRect(dx+8,dy+DINO_H-8,5,8+legOff);
  X.fillRect(dx+DINO_W-14,dy+DINO_H-8,5,8-legOff);
  // 手臂（小短手）
  X.fillStyle='#555';X.fillRect(dx+DINO_W-12,dy+12,6,4);
  // 尾巴
  X.fillStyle='#555';X.beginPath();X.moveTo(dx+4,dy+16);X.lineTo(dx-6,dy+10);X.lineTo(dx-2,dy+18);X.fill();
  // 下蹲时变矮
  if(isDucking){X.fillStyle='#555';X.fillRect(dx+6,dy+DINO_H-6,DINO_W-12,4)}
  X.restore();

  // 🌵 仙人掌 & 🦅 翼龙
  obstacles.forEach(o=>{
    const ox=o.x,oy=H-GROUND-(o.isBird?BIRD_W:CACTUS_H)-o.yOff;
    if(o.isBird){
      // 翼龙
      X.fillStyle='#666';
      X.beginPath();X.ellipse(ox+BIRD_W/2,oy+BIRD_H/2,BIRD_W/2,BIRD_H/2,0,0,Math.PI*2);X.fill();
      X.fillStyle='#888';
      X.beginPath();X.ellipse(ox+BIRD_W/2-4,oy+BIRD_H/2-3,6,4,0,0,Math.PI*2);X.fill();
      // 翅膀
      const wing=Math.sin(frame*0.2)*6;
      X.fillStyle='#777';
      X.beginPath();X.ellipse(ox+BIRD_W/2-5,oy+BIRD_H/2-wing,8,4,-0.3,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(ox+BIRD_W/2-5,oy+BIRD_H/2+wing,8,4,0.3,0,Math.PI*2);X.fill();
      X.fillStyle='#fff';X.beginPath();X.arc(ox+8,oy+6,2,0,Math.PI*2);X.fill();
      X.fillStyle='#222';X.beginPath();X.arc(ox+9,oy+6,1.2,0,Math.PI*2);X.fill();
    } else {
      // 仙人掌
      X.fillStyle='#2d8a4e';
      X.beginPath();X.roundRect(ox+1,oy,CACTUS_W-2,CACTUS_H-4,4);X.fill();
      X.fillStyle='#236b3e';
      X.fillRect(ox+3,oy+2,CACTUS_W-6,4);
      X.fillRect(ox+2,oy+8,CACTUS_W-4,3);
      // 分支
      X.fillStyle='#2d8a4e';
      X.beginPath();X.roundRect(ox-4,oy+8,5,10,3);X.fill();
      X.beginPath();X.roundRect(ox+CACTUS_W-1,oy+12,5,8,3);X.fill();
    }
  });

  // 分数
  X.fillStyle=isNight?'#fff':'#555';
  X.font='bold 14px monospace';X.textAlign='right';X.textBaseline='top';
  X.fillText('★ '+score,W-12,8);
  if(highScore)X.fillStyle='rgba(0,0,0,0.2)';X.font='11px monospace';X.fillText('HI '+(highScore||''),W-12,26);
  
  if(gameOver){
    X.fillStyle='rgba(0,0,0,0.25)';X.fillRect(0,0,W,H);
    X.fillStyle='#fff';X.font='bold 28px sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText('💀 GAME OVER',W/2,H/2-12);
    X.font='16px sans-serif';X.fillText('得分: '+score,W/2,H/2+22);
  }
}

function update(){
  if(!running||gameOver)return;
  frame++;timer++;
  if(timer%3===0&&!gameOver&&running)score++,S.textContent=score;
  speed=6+Math.floor(score/100)*0.8;
  if(speed>18)speed=18;

  // 重力
  if(dinoY>0){dinoVY+=G;dinoY+=dinoVY}
  // 落地
  if(dinoY<=0){dinoY=0;dinoVY=0;jumpCount=0}

  // 地面滚动
  groundX+=speed;
  
  // 障碍物移动
  obstacles.forEach(o=>o.x-=speed*1.2);
  obstacles=obstacles.filter(o=>o.x>-60);

  // 生成障碍物（随机紧凑间隔，像原版恐龙一样）
  if(frame>20&&obstacles.length<2){
    const last=obstacles[obstacles.length-1];
    const minGap=Math.max(150,400-speed*10);
    if(!last||last.x<W-minGap){
      if(Math.random()<0.03+speed*0.004){
        const isBird=Math.random()<0.2&&score>150;
        obstacles.push({
          x:W+5+Math.random()*15,
          yOff:isBird?(Math.random()<0.5?60:30):0,
          isBird
        });
      }
    }
  }

  // 碰撞检测
  const dinoL=60+6,dinoR=60+DINO_W-6;
  const dinoB=H-GROUND-dinoY-4;    // 脚底偏上一点（视觉宽容）
  const dinoT=dinoB-DINO_H+10;       // 头顶偏下一点
  
  for(const o of obstacles){
    const oL=o.x+2,oR=o.x+(o.isBird?BIRD_W:CACTUS_W)-2;
    const oT=H-GROUND-(o.isBird?BIRD_W:CACTUS_H)-o.yOff+4;  // 障碍物顶部（向下偏一点）
    const oB=oT+(o.isBird?BIRD_H:CACTUS_H)-4;                 // 障碍物底部（向上偏一点）
    if(dinoL<oR&&dinoR>oL){
      if(dinoT<oB&&dinoB>oT){
        endGame();return;
      }
    }
  }
  draw();
}

function endGame(){
  gameOver=true;running=false;clearInterval(loop);
  if(!highScore||score>highScore)highScore=score;
  ST.textContent='💀 Game Over! 得分: '+score+(score>=(highScore||0)?' (新纪录!)':'');
  document.getElementById('startBtn').textContent='🔄 再来一次';
  draw();
}

function startGame(){
  if(running)return;
  init();running=true;gameOver=false;
  document.getElementById('startBtn').textContent='▶ 游戏中';
  ST.textContent='';
  loop=setInterval(update,16);
}

function jump(){
  if(gameOver)return;
  if(!running)startGame();
  if(dinoY>0&&jumpCount>=1)return; // double jump disabled
  if(dinoY===0){dinoVY=JUMP;jumpCount=1;dinoY=1}
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump()}
  if(e.code==='ArrowDown'){e.preventDefault();isDucking=true}
});
document.addEventListener('keyup',e=>{if(e.code==='ArrowDown')isDucking=false});
C.addEventListener('click',jump);
C.addEventListener('touchstart',e=>{e.preventDefault();jump()},{passive:true});
init();
</script></body></html>
