<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乒乓球 🏓</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Segoe UI',system-ui,sans-serif}
.game-wrapper{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:#fff}
.back-btn{color:rgba(255,255,255,0.65);text-decoration:none;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.06)}.back-btn:hover{color:#fff;background:rgba(255,255,255,0.12)}.header h1{flex:1;font-size:24px;font-weight:700}.score-box{background:rgba(255,255,255,0.1);padding:8px 18px;border-radius:12px;font-size:16px;font-weight:600}
.score-box span{color:#fbbf24}canvas{display:block;margin:0 auto;border-radius:12px;background:#1a1a2e;box-shadow:inset 0 0 30px rgba(0,0,0,0.5)}
.controls{display:flex;justify-content:center;gap:12px;margin-top:20px}
.controls button{padding:10px 28px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.1);color:#fff;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.15)}
.controls button:hover{background:rgba(255,255,255,0.2);transform:translateY(-2px)}
.controls button.primary{background:#6366f1;border-color:#6366f1}
.controls button.primary:hover{background:#4f46e5}
.status{text-align:center;color:rgba(255,255,255,0.6);font-size:14px;margin-top:14px;min-height:22px}
@media(max-width:500px){.game-wrapper{padding:16px}.header h1{font-size:18px}canvas{max-width:100%}}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header"><a href="index.html" class="back-btn">← 游戏厅</a><h1>🏓 乒乓球</h1><div><span class="score-box" style="margin-right:8px">你 <span id="playerScore">0</span></span><span class="score-box">AI <span id="aiScore">0</span></span></div></div>
  <canvas id="gameCanvas" width="600" height="400"></canvas>
  <div class="controls">
    <button class="primary" id="startBtn">开始游戏</button>
    <button id="restartBtn">重新开始</button>
  </div>
  <div class="status" id="status">🖱 鼠标移动球拍 · 先到 5 分获胜</div>
  <div class="page-footer">🎮 经典游戏厅 · 13 合 1</div>
</div>
<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),pS=document.getElementById('playerScore'),aS=document.getElementById('aiScore'),ST=document.getElementById('status');
const PW=10,PH=70,BS=8;let W,H,pY,aY,bX,bY,bVX,bVY,pScore,aScore,running,gameOver,loop,winner;
function init(){W=C.width,H=C.height;pY=H/2-PH/2;aY=H/2-PH/2;pScore=0;aScore=0;running=false;gameOver=false;winner='';pS.textContent='0';aS.textContent='0';ST.textContent='🖱 鼠标移动球拍 · 先到 5 分获胜';resetBall();draw()}
function resetBall(){bX=W/2;bY=H/2;const a=Math.random()*Math.PI*2;const s=4;bVX=Math.cos(a)*s*(Math.random()>0.5?1:-1);bVY=Math.sin(a)*s;if(Math.abs(bVX)<2)bVX=bVX>0?2:-2}
function draw(){X.clearRect(0,0,W,H);
X.strokeStyle='rgba(255,255,255,0.08)';X.lineWidth=2;X.setLineDash([8,12]);X.beginPath();X.moveTo(W/2,0);X.lineTo(W/2,H);X.stroke();X.setLineDash([]);
const r=6;
X.fillStyle='#6366f1';X.beginPath();X.roundRect(15,pY,PW,PH,r);X.fill();
X.fillStyle='#ef4444';X.beginPath();X.roundRect(W-15-PW,aY,PW,PH,r);X.fill();
X.fillStyle='#fff';X.beginPath();X.arc(bX,bY,BS,0,Math.PI*2);X.fill();
const g=X.createRadialGradient(bX-2,bY-2,0,bX,bY,BS);g.addColorStop(0,'rgba(255,255,255,0.6)');g.addColorStop(1,'rgba(255,255,255,0)');X.fillStyle=g;X.beginPath();X.arc(bX-2,bY-2,BS,0,Math.PI*2);X.fill()}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,rr){this.moveTo(x+rr,y);this.lineTo(x+w-rr,y);this.quadraticCurveTo(x+w,y,x+w,y+rr);this.lineTo(x+w,y+h-rr);this.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);this.lineTo(x+rr,y+h);this.quadraticCurveTo(x,y+h,x,y+h-rr);this.lineTo(x,y+rr);this.quadraticCurveTo(x,y,x+rr,y)}}
function update(){if(!running||gameOver)return;bX+=bVX;bY+=bVY;
if(bY-BS<0||bY+BS>H){bVY=-bVY;bY=bY-BS<0?BS:H-BS}
if(bX-BS<15+PW&&bX-BS<15+PW+5&&bY+BS>pY&&bY-BS<pY+PH){bVX=Math.abs(bVX)+0.3;const offset=(bY-(pY+PH/2))/(PH/2);bVY=offset*4;bX=15+PW+BS}
if(bX+BS>W-15-PW&&bX+BS>W-15-PW-5&&bY+BS>aY&&bY-BS<aY+PH){bVX=-(Math.abs(bVX)+0.3);const offset=(bY-(aY+PH/2))/(PH/2);bVY=offset*4;bX=W-15-PW-BS}
if(bX<0){aScore++;aS.textContent=aScore;if(aScore>=5){endGame('AI');return}resetBall()}
if(bX>W){pScore++;pS.textContent=pScore;if(pScore>=5){endGame('你');return}resetBall()}
const speed=3.5;let aTarget;if(bVX>0){aTarget=bY}else{aTarget=H/2}aY+=Math.sign(aTarget-aY)*Math.min(speed,Math.abs(aTarget-aY));aY=Math.max(0,Math.min(H-PH,aY));
draw()}
function endGame(w){gameOver=true;running=false;clearInterval(loop);winner=w;ST.textContent=`🎉 ${w} 获胜！${pScore} - ${aScore}`;document.getElementById('startBtn').textContent='🔄 再来一局'}
function startGame(){if(running)return;if(gameOver||document.getElementById('startBtn').textContent.includes('开始'))init();running=true;document.getElementById('startBtn').textContent='▶ 比赛中';ST.textContent='';loop=setInterval(update,16)}
document.getElementById('startBtn').addEventListener('click',startGame);document.getElementById('restartBtn').addEventListener('click',()=>{clearInterval(loop);init();document.getElementById('startBtn').textContent='开始游戏'});
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();pY=Math.max(0,Math.min(H-PH,(e.clientY-r.top)*H/r.height))});
init();
</script></body></html>
