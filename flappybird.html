<script>
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),S=document.getElementById('score'),ST=document.getElementById('status');
const W=400,H=500,G=0.4,FLAP=-7,BIRD_R=12,GAP=130,PW=50,PS=2.5;
let birdY,birdVY,pipes,score,running,gameOver,loop,frame;
function init(){birdY=H/2;birdVY=0;pipes=[];score=0;running=false;gameOver=false;frame=0;S.textContent='0';ST.textContent='点击 / 按 空格/↑ 飞行 · 躲避管道';draw()}
function draw(){X.clearRect(0,0,W,H);
const sky=X.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#1a1a3e');sky.addColorStop(0.5,'#2d2a5e');sky.addColorStop(1,'#3a3a5e');X.fillStyle=sky;X.fillRect(0,0,W,H);
// 远处的星星
if(!frame)frame=0;for(let i=0;i<20;i++){const sx=(i*71+frame)%W,sy=(i*53+17)%(H*0.6);X.fillStyle=`rgba(255,255,255,${0.2+Math.sin(i+frame*0.02)*0.15})`;X.beginPath();X.arc(sx,sy,1.5,0,Math.PI*2);X.fill()}
// 管道
X.fillStyle='rgba(255,255,255,0.03)';X.fillRect(0,H-30,W,30);
pipes.forEach(p=>{const g=X.createLinearGradient(p.x,0,p.x+PW,0);g.addColorStop(0,'#22c55e');g.addColorStop(0.3,'#16a34a');g.addColorStop(0.7,'#16a34a');g.addColorStop(1,'#22c55e');
X.fillStyle=g;X.beginPath();X.roundRect(p.x,0,PW,p.top,3);X.fill();X.beginPath();X.roundRect(p.x,p.top+GAP,PW,H-p.top-GAP,3);X.fill();
X.fillStyle='rgba(255,255,255,0.1)';X.beginPath();X.roundRect(p.x+5,Math.max(0,p.top-20),PW-10,20,2);X.fill();X.beginPath();X.roundRect(p.x+5,p.top+GAP,PW-10,20,2);X.fill()});
// 鸟
const bx=100,by=birdY;
X.save();X.translate(bx,by);const angle=Math.max(-0.5,Math.min(0.5,birdVY*0.05));X.rotate(angle);
X.beginPath();X.arc(0,0,BIRD_R,0,Math.PI*2);const g=X.createRadialGradient(-3,-3,0,0,0,BIRD_R);g.addColorStop(0,'#fbbf24');g.addColorStop(1,'#f59e0b');X.fillStyle=g;X.fill();
X.strokeStyle='#92400e';X.lineWidth=1.5;X.stroke();
X.fillStyle='#fff';X.beginPath();X.arc(4,-3,4,0,Math.PI*2);X.fill();X.fillStyle='#111';X.beginPath();X.arc(5,-3,2,0,Math.PI*2);X.fill();
X.beginPath();X.moveTo(10,2);X.lineTo(14,4);X.lineTo(10,6);X.fillStyle='#f97316';X.fill();
X.restore();
if(gameOver){X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(0,0,W,H);X.fillStyle='#fff';X.font='bold 28px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('💀 撞了！',W/2,H/2-20);X.font='18px sans-serif';X.fillText('得分: '+score,W/2,H/2+20)}
drawUi()}
function drawUi(){X.fillStyle='#fff';X.font='bold 14px sans-serif';X.textAlign='left';X.textBaseline='top';X.fillText('🐦 '+score,10,10)}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,rr){this.moveTo(x+rr,y);this.lineTo(x+w-rr,y);this.quadraticCurveTo(x+w,y,x+w,y+rr);this.lineTo(x+w,y+h-rr);this.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);this.lineTo(x+rr,y+h);this.quadraticCurveTo(x,y+h,x,y+h-rr);this.lineTo(x,y+rr);this.quadraticCurveTo(x,y,x+rr,y)}}
function update(){if(!running||gameOver)return;frame++;
birdVY+=G;birdY+=birdVY;if(birdY>H-30-BIRD_R){birdY=H-30-BIRD_R;birdVY=0;endGame();return}if(birdY<BIRD_R){birdY=BIRD_R;birdVY=0}
pipes.forEach(p=>p.x-=PS);
if(pipes.length===0||pipes[pipes.length-1].x<W-250){const top=40+Math.random()*(H-GAP-80);pipes.push({x:W,top})}
if(pipes[0]&&pipes[0].x+PW<0)pipes.shift();
pipes.forEach(p=>{if(100+BIRD_R>p.x&&100-BIRD_R<p.x+PW&&(birdY-BIRD_R<p.top||birdY+BIRD_R>p.top+GAP))endGame()});
pipes.forEach(p=>{if(!p.scored&&p.x+PW<100){p.scored=true;score++;S.textContent=score;}});
draw()}
function endGame(){gameOver=true;running=false;clearInterval(loop);ST.textContent='💀 撞了！得分: '+score;document.getElementById('startBtn').textContent='🔄 再来一次'}
function startGame(){if(running)return;init();running=true;gameOver=false;document.getElementById('startBtn').textContent='▶ 游戏中';ST.textContent='';loop=setInterval(update,16)}
function flap(){if(gameOver)return;if(!running)startGame();birdVY=FLAP}
document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();flap()}});
C.addEventListener('click',flap);C.addEventListener('touchstart',flap,{passive:true});
init();
</script></body></html>
